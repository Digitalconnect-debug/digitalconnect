<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miscellaneous Website Designs</title>
<link rel="stylesheet" href="style.css">

<style>
.demo-page{
    text-align:center;
    padding:40px 20px;
}
.demo-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}
.demo-card{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}
.demo-card:hover{
    transform:translateY(-5px);
}
.demo-card img{
    width:100%;
    height:160px;
    object-fit:cover;
}
.demo-card h3{
    margin:10px 0;
}
.demo-card button{
    margin:5px;
    padding:8px 12px;
    border:none;
    background:#28a745;   /* GREEN */
    color:white;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
}
.demo-card button:hover{
    background:#218838;   /* DARK GREEN HOVER */
}
</style>

</head>
<body>

<section class="demo-page">

<h1>Miscellaneous Website Designs</h1>
<p>Select a professional design for your business</p>

<div class="demo-grid">

<div class="demo-card">
<img src="https://picsum.photos/400/300?random=1">
<h3>Property dealer Website</h3>
<button onclick="openDemo('demo/misc1/index.html')">Live Preview</button>
<button onclick="location.href='index.html#contact'">Select Design</button>

function openDemo(link){

</script>
<!-- POPUP -->
<div id="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999;">
